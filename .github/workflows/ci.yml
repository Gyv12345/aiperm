name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      MAVEN_VERSION: 4.0.0-rc-5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download Maven 4
        run: |
          curl -fsSL "https://dlcdn.apache.org/maven/maven-4/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz" -o "$RUNNER_TEMP/apache-maven.tar.gz"
          tar -xzf "$RUNNER_TEMP/apache-maven.tar.gz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/apache-maven-${MAVEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Verify Maven
        run: mvn -version

      - name: Build Backend
        working-directory: backend
        run: mvn -B -ntp -DskipTests package

      - name: Run Backend Tests
        working-directory: backend
        run: mvn -B -ntp test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: pnpm install

      - name: Type Check
        working-directory: frontend
        run: pnpm run type-check

      - name: Lint
        working-directory: frontend
        run: pnpm run lint

      - name: Build Frontend
        working-directory: frontend
        run: pnpm run build
