server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    # 修复 macOS 上的 SO_LINGER socket 选项问题
    connection-timeout: 20s
    keep-alive-timeout: 60s
spring:
  application:
    name: aiperm
  threads:
    virtual:
      enabled: true
  main:
    keep-alive: true

  # Jackson配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  profiles:
    active: dev

# Sa-Token配置
sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: 1800
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

# SpringDoc API文档配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: AiPerm RBAC权限系统API
    description: 基于Spring Boot 4 + Sa-Token + JPA的RBAC权限管理系统
    version: 1.0.0
    contact:
      name: DevLoveCode
  packages-to-scan: com.devlovecode.aiperm.modules
