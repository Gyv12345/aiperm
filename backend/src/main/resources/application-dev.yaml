# 开发环境配置
# 使用方式：设置环境变量 SPRING_PROFILES_ACTIVE=dev 或在 IDE 中激活 dev profile

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false
    clean-disabled: false

  # 数据源配置 - 开发环境
  # 可通过环境变量覆盖，便于本地和测试机复用
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/aiperm?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  # Redis配置 - 开发环境
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

# 日志配置
# SQL 打印说明（Hibernate 7 / Spring Boot 4）：
#   - org.hibernate.SQL=trace：打印执行的 SQL 语句（仍含 ? 占位符）。
#   - org.hibernate.orm.jdbc.bind=trace：打印每个绑定参数的值与类型，与上一行
#     对应，可手动拼出完整可执行的 SQL。
#   - spring.jpa.show-sql 保持 false（走 logging 通道，避免 System.out 重复输出）。
logging:
  level:
    com.devlovecode.aiperm: debug
    org.hibernate.SQL: trace
    org.hibernate.orm.jdbc.bind: trace
    org.hibernate.orm.jdbc.extract: trace

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: 0.0
    export:
      enabled: false
      otlp:
        enabled: false
  otlp:
    metrics:
      export:
        enabled: false

# 认证配置
auth:
  captcha:
    enabled: false

# OSS 文件存储配置
oss:
  storage-type: local
  local:
    path: ./uploads
    access-url: http://localhost:8080/files
  aliyun:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: your-bucket-name
    access-url: https://your-bucket.oss-cn-hangzhou.aliyuncs.com
