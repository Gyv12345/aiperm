# 生产环境配置
# 使用方式：设置环境变量 SPRING_PROFILES_ACTIVE=prod

spring:
  flyway:
    enabled: false

  # 数据源配置 - 生产环境（建议通过环境变量注入）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/aiperm?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  # Redis配置 - 生产环境
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

logging:
  file:
    name: /var/log/aiperm/aiperm.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [trace=%X{traceId:-},span=%X{spanId:-}] %logger{36} - %msg%n%ex"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [trace=%X{traceId:-},span=%X{spanId:-}] %logger{36} - %msg%n%ex"
  logback:
    rollingpolicy:
      file-name-pattern: /var/log/aiperm/aiperm.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 100MB
      max-history: 14
      total-size-cap: 2GB
  level:
    root: info
    com.devlovecode.aiperm: info
    org.springframework.jdbc.core.JdbcTemplate: info
    org.springframework.jdbc.core.StatementCreatorUtils: warn

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING:0.05}
    export:
      enabled: true
      otlp:
        enabled: ${MANAGEMENT_OTLP_TRACING_ENABLED:false}
  otlp:
    metrics:
      export:
        enabled: ${MANAGEMENT_OTLP_METRICS_ENABLED:false}

# 认证配置
auth:
  captcha:
    enabled: true

# OSS 文件存储配置
oss:
  storage-type: local
  local:
    path: ./uploads
    access-url: http://localhost:8080/files
  aliyun:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: your-bucket-name
    access-url: https://your-bucket.oss-cn-hangzhou.aliyuncs.com
